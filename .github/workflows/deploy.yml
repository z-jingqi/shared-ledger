name: Deploy changed Cloudflare layers
on:
  push:
    branches: [main, develop]
permissions:
  contents: read
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      migration: ${{ steps.filter.outputs.migration }}
      shared: ${{ steps.filter.outputs.shared }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
            api:
              - 'apps/api/**'
              - 'packages/ai/**'
              - 'packages/import/**'
            migration:
              - 'packages/db/migrations/**'
            shared:
              - 'packages/shared/**'
            infrastructure:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'scripts/**'
              - '.github/workflows/deploy.yml'
  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.infrastructure == 'true'
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shared-ledger/web build
        env:
          VITE_API_URL: /api
      - run: node ../../scripts/prepare-wrangler-config.mjs web preview && ../../apps/api/node_modules/.bin/wrangler deploy --config wrangler.generated-web-preview.json
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  migrate-database:
    needs: changes
    if: needs.changes.outputs.migration == 'true'
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: node ../../scripts/prepare-wrangler-config.mjs api preview && ../../apps/api/node_modules/.bin/wrangler d1 migrations apply shared-ledger-preview --remote --config wrangler.generated-api-preview.json
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  deploy-api:
    needs: [changes, migrate-database]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.infrastructure == 'true') &&
      (needs.migrate-database.result == 'success' || needs.migrate-database.result == 'skipped')
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: node ../../scripts/prepare-wrangler-config.mjs api preview
        working-directory: apps/api
        env:
          ALEPH_AI_SERVICE_PREVIEW: ${{ vars.ALEPH_AI_SERVICE_PREVIEW || 'aleph-ai-orchestrator-preview' }}
          ALEPH_AI_ENV_PREVIEW: ${{ vars.ALEPH_AI_ENV_PREVIEW || 'preview' }}
          ALEPH_TOOLS_SERVICE_PREVIEW: ${{ vars.ALEPH_TOOLS_SERVICE_PREVIEW || 'aleph-tools-gateway-preview' }}
      - run: |
          if [ -n "$ALEPH_AI_SERVICE_TOKEN" ]; then
            printf "%s" "$ALEPH_AI_SERVICE_TOKEN" | ../../apps/api/node_modules/.bin/wrangler secret put ALEPH_AI_SERVICE_TOKEN --config wrangler.generated-api-preview.json
          fi
          if [ -n "$ALEPH_TOOLS_API_KEY" ]; then
            printf "%s" "$ALEPH_TOOLS_API_KEY" | ../../apps/api/node_modules/.bin/wrangler secret put ALEPH_TOOLS_API_KEY --config wrangler.generated-api-preview.json
          fi
          if [ -n "$ALEPH_TOOLS_WEBHOOK_SECRET" ]; then
            printf "%s" "$ALEPH_TOOLS_WEBHOOK_SECRET" | ../../apps/api/node_modules/.bin/wrangler secret put ALEPH_TOOLS_WEBHOOK_SECRET --config wrangler.generated-api-preview.json
          fi
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALEPH_AI_SERVICE_TOKEN: ${{ secrets.ALEPH_AI_SERVICE_TOKEN }}
          ALEPH_TOOLS_API_KEY: ${{ secrets.ALEPH_TOOLS_API_KEY }}
          ALEPH_TOOLS_WEBHOOK_SECRET: ${{ secrets.ALEPH_TOOLS_WEBHOOK_SECRET }}
      - run: ../../apps/api/node_modules/.bin/wrangler deploy --config wrangler.generated-api-preview.json
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
